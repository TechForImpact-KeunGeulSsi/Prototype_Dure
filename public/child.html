<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마루와 대화하기 — 두레</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .nav { flex-shrink: 0; }
    .main { flex: 1; display: flex; }
    /* SETUP PANEL */
    .setup-panel {
      width: 100%; max-width: 560px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    /* CHAT LAYOUT — 채팅 시엔 뷰포트 고정 */
    .chat-container {
      display: none;
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      flex-direction: column;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: white;
      z-index: 10;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: white;
      flex-shrink: 0;
    }
    .maru-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1D9E75, #5DCAA5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .chat-header-info h3 { font-size: 15px; font-weight: 700; }
    .chat-header-info p { font-size: 12px; color: var(--text-muted); }
    .online-dot {
      width: 8px; height: 8px;
      background: #4CAF50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--bg); }
    .msg-group { display: flex; flex-direction: column; gap: 4px; }
    .msg-group.user { align-items: flex-end; }
    .msg-group.ai { align-items: flex-start; }
    .chat-bubble { max-width: 76%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
    .chat-bubble.ai { background: white; border: 1.5px solid var(--border); border-bottom-left-radius: 4px; animation: bubbleIn 0.3s ease; }
    .chat-bubble.user { background: var(--teal); color: white; border-bottom-right-radius: 4px; animation: bubbleIn 0.3s ease; }
    @keyframes bubbleIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .chat-meta { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      max-width: 80px;
    }
    .typing-indicator.show { display: flex; }
    .dot { width: 6px; height: 6px; background: var(--teal-mid); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .chat-input-area {
      flex-shrink: 0;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-input-row { display: flex; gap: 10px; }
    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--teal); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--teal);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--teal-dark); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .save-bar {
      display: none;
      background: var(--teal-light);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .save-bar.show { display: flex; }
    .save-bar p { font-size: 12px; color: var(--teal-dark); font-weight: 600; }
    /* CHILD SELECT */
    .child-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .child-card {
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .child-card:hover { border-color: var(--teal); background: var(--teal-light); }
    .child-card.selected { border-color: var(--teal); background: var(--teal-light); }
    .child-card .child-emoji { font-size: 24px; }
    .child-card .child-name { font-weight: 700; font-size: 14px; }
    .child-card .child-info { font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <div class="logo">🌱</div>
      두레
    </a>
    <div class="nav-links">
      <a href="index.html">홈</a>
      <a href="child.html" class="active">아이</a>
      <a href="teacher.html">선생님</a>
      <a href="parent.html">부모님</a>
      <a href="dashboard.html">대시보드</a>
    </div>
  </nav>

  <div class="main">
    <!-- SETUP PANEL -->
    <div class="setup-panel fade-in" id="setupPanel">
      <div style="text-align:center; margin-bottom:28px;">
        <div style="font-size:56px; margin-bottom:12px;">🌳</div>
        <h1 style="font-size:22px; font-weight:900; margin-bottom:6px;">안녕! 나는 마루야 😊</h1>
        <p style="font-size:14px; color:var(--text-muted);">오늘 어떤 활동 했는지 이야기해줄래?<br>같이 이야기하면서 오늘을 기록해보자!</p>
      </div>

      <div class="card">
        <label class="label">📍 나는 누구야?</label>
        <div class="child-select-grid" id="childGrid"></div>

        <div style="margin-top:16px;">
          <label class="label">🎯 오늘 어떤 활동 했어?</label>
          <div class="select-grid" id="activityGrid"></div>
        </div>

        <button class="btn btn-primary" style="width:100%; margin-top:20px; font-size:16px; padding:14px;" id="startBtn" disabled>
          마루랑 대화 시작하기! 🌿
        </button>
      </div>
    </div>

    <!-- CHAT CONTAINER -->
    <div class="chat-container" id="chatContainer">
      <div class="chat-header">
        <div class="maru-avatar">🌳</div>
        <div class="chat-header-info">
          <h3>마루 <span style="font-size:11px; font-weight:400; color:var(--teal);"><span class="online-dot"></span>대화 중</span></h3>
          <p id="chatSubtitle">두레 AI 친구</p>
        </div>
        <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
          <span id="exchangeCount" class="badge">0 / 5</span>
          <button class="btn btn-sm btn-secondary" onclick="resetChat()">← 다시 시작</button>
        </div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="typing-indicator" id="typingIndicator">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="save-bar" id="saveBar">
          <p>💡 대화가 충분히 쌓였어! 오늘 기록을 저장할까?</p>
          <button class="btn btn-primary btn-sm" id="saveBtn" onclick="saveConversation()">저장하기</button>
        </div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="chatInput" placeholder="오늘 이야기를 마루에게 말해봐..." maxlength="300" />
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let selectedChild = null;
    let selectedActivity = null;
    let messages = [];
    let exchangeCount = 0;
    const MAX_EXCHANGES = 8;
    const SAVE_THRESHOLD = 4;

    // Load children and activities
    async function init() {
      const [children, activities] = await Promise.all([
        fetch('/api/children').then(r => r.json()),
        fetch('/api/activities').then(r => r.json()),
      ]);

      const childGrid = document.getElementById('childGrid');
      children.forEach(child => {
        const el = document.createElement('div');
        el.className = 'child-card';
        el.innerHTML = `<span class="child-emoji">${child.emoji}</span><div><div class="child-name">${child.name}</div><div class="child-info">${child.grade} · ${child.village}</div></div>`;
        el.onclick = () => selectChild(child, el);
        childGrid.appendChild(el);
      });

      const activityIcons = { '목공수업': '🪵', '생태교실': '🌿', '마을탐험': '🗺️', '음반제작': '🎵', '두부만들기': '🫘', '달리기훈련': '🏃', '엄빠학교': '📚', '플로깅': '🌍', '어르신 말벗': '👴' };
      const actGrid = document.getElementById('activityGrid');
      activities.forEach(act => {
        const el = document.createElement('div');
        el.className = 'select-card';
        el.innerHTML = `<span class="icon">${activityIcons[act] || '⭐'}</span>${act}`;
        el.onclick = () => selectActivity(act, el);
        actGrid.appendChild(el);
      });
    }

    function selectChild(child, el) {
      document.querySelectorAll('.child-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedChild = child;
      checkReady();
    }

    function selectActivity(act, el) {
      document.querySelectorAll('.select-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      selectedActivity = act;
      checkReady();
    }

    function checkReady() {
      document.getElementById('startBtn').disabled = !(selectedChild && selectedActivity);
    }

    document.getElementById('startBtn').onclick = startChat;

    async function startChat() {
      document.getElementById('setupPanel').style.display = 'none';
      const chatContainer = document.getElementById('chatContainer');
      chatContainer.style.display = 'flex';
      // 채팅 모드: body 스크롤 고정, main도 overflow hidden으로
      document.body.style.overflow = 'hidden';
      document.body.style.height = '100vh';
      document.querySelector('.main').style.overflow = 'hidden';
      document.getElementById('chatSubtitle').textContent = `${selectedChild.name} · ${selectedActivity}`;
      messages = [];
      exchangeCount = 0;

      // Get AI opening message
      showTyping();
      try {
        const res = await fetch('/api/chat/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ childName: selectedChild.name, activity: selectedActivity })
        });
        const data = await res.json();
        hideTyping();
        addMessage('ai', data.content);
        messages.push({ role: 'assistant', content: data.content });
      } catch (e) {
        hideTyping();
        const fallback = `안녕, ${selectedChild.name}야! 오늘 ${selectedActivity} 어땠어? 😊`;
        addMessage('ai', fallback);
        messages.push({ role: 'assistant', content: fallback });
      }
    }

    function addMessage(role, content) {
      const area = document.getElementById('chatArea');
      const typing = document.getElementById('typingIndicator');

      const group = document.createElement('div');
      group.className = `msg-group ${role}`;

      if (role === 'ai') {
        const meta = document.createElement('div');
        meta.className = 'chat-meta';
        meta.textContent = '🌳 마루';
        group.appendChild(meta);
      } else {
        const meta = document.createElement('div');
        meta.className = 'chat-meta user-meta';
        meta.textContent = selectedChild.name;
        group.appendChild(meta);
      }

      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      bubble.textContent = content;
      group.appendChild(bubble);

      area.insertBefore(group, typing);
      area.scrollTop = area.scrollHeight;
    }

    function showTyping() {
      const t = document.getElementById('typingIndicator');
      t.classList.add('show');
      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    }
    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('show');
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || document.getElementById('sendBtn').disabled) return;

      input.value = '';
      addMessage('user', text);
      messages.push({ role: 'user', content: text });
      exchangeCount++;
      document.getElementById('exchangeCount').textContent = `${exchangeCount} / ${MAX_EXCHANGES}`;

      if (exchangeCount >= SAVE_THRESHOLD) {
        document.getElementById('saveBar').classList.add('show');
      }

      if (exchangeCount >= MAX_EXCHANGES) {
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatInput').disabled = true;
        addMessage('ai', '오늘 이야기 잘 들었어! 오늘 기록을 저장해두자 📝');
        return;
      }

      showTyping();
      document.getElementById('sendBtn').disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, activity: selectedActivity, childName: selectedChild.name })
        });
        const data = await res.json();
        hideTyping();
        addMessage('ai', data.content);
        messages.push({ role: 'assistant', content: data.content });
      } catch (e) {
        hideTyping();
        addMessage('ai', '잠깐, 생각 중이야... 다시 말해줄 수 있어? 😊');
      } finally {
        document.getElementById('sendBtn').disabled = false;
      }
    }

    document.getElementById('chatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function saveConversation() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '저장 중...';
      try {
        const res = await fetch('/api/conversations/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            childId: selectedChild.id,
            childName: selectedChild.name,
            activity: selectedActivity,
            messages
          })
        });
        await res.json();
        showToast('✅ 오늘 대화가 저장됐어! 부모님이 확인하실 수 있어요 😊', 'success');
        document.getElementById('saveBar').innerHTML = '<p style="color:var(--teal-dark); font-weight:700;">✅ 오늘 기록 저장 완료! 부모님 리포트에 반영돼요</p>';
      } catch (e) {
        showToast('저장 중 오류가 발생했어요', 'error');
        btn.disabled = false;
        btn.textContent = '저장하기';
      }
    }

    function resetChat() {
      document.getElementById('chatContainer').style.display = 'none';
      document.getElementById('setupPanel').style.display = 'block';
      // 셋업 패널 복귀: body 스크롤 복원
      document.body.style.overflow = 'auto';
      document.body.style.height = 'auto';
      document.querySelector('.main').style.overflow = '';
      document.getElementById('chatArea').querySelectorAll('.msg-group').forEach(el => el.remove());
      document.getElementById('saveBar').classList.remove('show');
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').disabled = false;
      document.getElementById('exchangeCount').textContent = '0 / 5';
      messages = []; exchangeCount = 0;
      selectedChild = null; selectedActivity = null;
      document.querySelectorAll('.child-card, .select-card').forEach(el => el.classList.remove('selected', 'active'));
      document.getElementById('startBtn').disabled = true;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    init();
  </script>
</body>
</html>
