<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 아이 성장 기록 — 부모님</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; max-width: 1060px; margin: 0 auto; padding: 32px 24px; min-height: calc(100vh - 60px); }
    .sidebar { position: sticky; top: 80px; height: fit-content; }
    .child-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      width: 100%;
      margin-bottom: 8px;
      font-family: inherit;
      text-align: left;
    }
    .child-btn:hover { border-color: var(--teal); background: var(--teal-light); }
    .child-btn.active { border-color: var(--teal); background: var(--teal-light); }
    .child-btn .emoji { font-size: 24px; }
    .child-btn .name { font-weight: 700; font-size: 14px; }
    .child-btn .info { font-size: 11px; color: var(--text-muted); }
    .content-area { min-height: 400px; }
    .report-card { white-space: pre-line; }
    .competency-bars { display: flex; flex-direction: column; gap: 10px; }
    .comp-row { display: flex; align-items: center; gap: 12px; }
    .comp-label { font-size: 13px; font-weight: 600; width: 70px; flex-shrink: 0; }
    .comp-bar { flex: 1; height: 10px; background: var(--teal-light); border-radius: 5px; overflow: hidden; }
    .comp-fill { height: 100%; background: var(--teal); border-radius: 5px; transition: width 0.8s ease; }
    .comp-count { font-size: 12px; color: var(--text-muted); width: 30px; text-align: right; flex-shrink: 0; }
    .voice-item {
      background: var(--teal-light);
      border-left: 3px solid var(--teal);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--teal-dark);
      margin-bottom: 8px;
      font-style: italic;
      line-height: 1.5;
    }
    .activity-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px;
      border-radius: 50px;
      background: white;
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      margin: 3px;
    }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { position: static; } }
    .report-generating {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center;
    }
    .report-generating .spinner { width: 36px; height: 36px; margin-bottom: 12px; }
    .section-card { margin-bottom: 20px; }
    .section-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand"><div class="logo">🌱</div>두레</a>
    <div class="nav-links">
      <a href="index.html">홈</a>
      <a href="child.html">아이</a>
      <a href="teacher.html">선생님</a>
      <a href="parent.html" class="active">부모님</a>
      <a href="dashboard.html">대시보드</a>
    </div>
  </nav>

  <div class="layout">
    <div class="sidebar">
      <div class="page-header" style="margin-bottom:16px;">
        <h1 style="font-size:20px;">💌 우리 아이<br>성장 기록</h1>
      </div>
      <div id="childList"></div>
      <div style="margin-top:16px; padding:14px; background:var(--amber-light); border-radius:var(--radius-sm); font-size:12px; color:#92550A; line-height:1.6;">
        📱 실제 서비스에서는 카카오 알림톡으로 매달 자동 발송됩니다
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <div class="empty-state fade-in">
        <div class="empty-icon">💌</div>
        <h3>아이를 선택해주세요</h3>
        <p>왼쪽에서 아이 이름을 클릭하면<br>성장 기록을 확인할 수 있어요</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let children = [];
    let selectedChild = null;
    const activityIcons = { '목공수업':'🪵','생태교실':'🌿','마을탐험':'🗺️','음반제작':'🎵','두부만들기':'🫘','달리기훈련':'🏃','엄빠학교':'📚','플로깅':'🌍','어르신 말벗':'👴' };

    async function init() {
      children = await fetch('/api/children').then(r => r.json());
      const list = document.getElementById('childList');
      children.forEach(child => {
        const btn = document.createElement('button');
        btn.className = 'child-btn';
        btn.innerHTML = `<span class="emoji">${child.emoji}</span><div><div class="name">${child.name}</div><div class="info">${child.grade} · ${child.village}</div></div>`;
        btn.onclick = () => selectChild(child, btn);
        list.appendChild(btn);
      });
    }

    async function selectChild(child, btn) {
      document.querySelectorAll('.child-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedChild = child;
      renderLoading(child);

      const [records, conversations] = await Promise.all([
        fetch('/api/records').then(r => r.json()),
        fetch(`/api/conversations/${child.id}`).then(r => r.json()),
      ]);

      const childRecords = records.filter(r => r.participantIds.includes(child.id));
      renderContent(child, childRecords, conversations);
    }

    function renderLoading(child) {
      document.getElementById('contentArea').innerHTML = `
        <div class="report-generating">
          <div class="spinner"></div>
          <p style="color:var(--text-muted); font-size:14px;">${child.name} 기록 불러오는 중...</p>
        </div>`;
    }

    function renderContent(child, records, conversations) {
      // Compute competency stats
      const allTags = [...records.flatMap(r => r.tags), ...conversations.flatMap(c => c.tags || [])];
      const tagStats = {};
      allTags.forEach(t => { tagStats[t] = (tagStats[t] || 0) + 1; });
      const maxTag = Math.max(...Object.values(tagStats), 1);

      const activitySet = [...new Set(records.map(r => r.activity))];
      const voices = conversations.flatMap(c => c.messages.filter(m => m.role === 'user').map(m => m.content)).slice(-6);
      const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 8);

      document.getElementById('contentArea').innerHTML = `
        <div class="fade-in">
          <!-- Header -->
          <div class="card card-lg" style="margin-bottom:20px; background:linear-gradient(135deg,#0F6E56,#1D9E75); color:white; border:none;">
            <div style="display:flex; align-items:center; gap:16px;">
              <div style="font-size:52px;">${child.emoji}</div>
              <div>
                <h2 style="font-size:22px; font-weight:900; margin-bottom:4px;">${child.name}</h2>
                <p style="font-size:13px; opacity:0.85;">${child.grade} · ${child.village}</p>
                <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
                  <span style="background:rgba(255,255,255,0.2); border-radius:50px; padding:4px 12px; font-size:12px;">활동 ${records.length}회</span>
                  <span style="background:rgba(255,255,255,0.2); border-radius:50px; padding:4px 12px; font-size:12px;">AI 대화 ${conversations.length}회</span>
                  <span style="background:rgba(255,255,255,0.2); border-radius:50px; padding:4px 12px; font-size:12px;">참여 활동 ${activitySet.length}종</span>
                </div>
              </div>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
            <!-- Competency -->
            <div class="card section-card">
              <h3>⭐ 역량 분석</h3>
              <div class="competency-bars">
                ${Object.keys(tagStats).length === 0
                  ? '<p style="font-size:13px; color:var(--text-muted);">아직 태그 기록이 없어요</p>'
                  : Object.entries(tagStats).sort((a,b)=>b[1]-a[1]).map(([tag, cnt]) => `
                    <div class="comp-row">
                      <span class="comp-label">${tag}</span>
                      <div class="comp-bar"><div class="comp-fill" style="width:${Math.round(cnt/maxTag*100)}%"></div></div>
                      <span class="comp-count">${cnt}</span>
                    </div>`).join('')}
              </div>
            </div>

            <!-- Activities -->
            <div class="card section-card">
              <h3>🎯 참여한 활동들</h3>
              ${activitySet.length === 0
                ? '<p style="font-size:13px; color:var(--text-muted);">기록된 활동이 없어요</p>'
                : `<div style="margin-bottom:12px;">${activitySet.map(a => `<span class="activity-chip">${activityIcons[a]||'⭐'} ${a}</span>`).join('')}</div>
                   <div style="font-size:12px; color:var(--text-muted); padding-top:10px; border-top:1px solid var(--border);">최근 활동: ${sortedRecords[0]?.date || '-'}</div>`}
            </div>
          </div>

          <!-- Child's voice -->
          <div class="card section-card" style="margin-bottom:20px;">
            <h3>🗣️ ${child.name}의 목소리 (AI 대화에서)</h3>
            ${voices.length === 0
              ? '<p style="font-size:13px; color:var(--text-muted);">아직 AI 대화 기록이 없어요. 아이가 마루와 대화하도록 해보세요!</p>'
              : voices.map(v => `<div class="voice-item">"${v}"</div>`).join('')}
          </div>

          <!-- Timeline -->
          <div class="card section-card" style="margin-bottom:20px;">
            <h3>📅 활동 기록</h3>
            ${sortedRecords.length === 0
              ? '<p style="font-size:13px; color:var(--text-muted);">기록된 활동이 없어요</p>'
              : `<div class="timeline">
                  ${sortedRecords.map(r => `
                    <div class="timeline-item">
                      <div class="timeline-date">${r.date}</div>
                      <div class="timeline-content">
                        <div class="timeline-title">${activityIcons[r.activity]||'⭐'} ${r.activity} <span class="badge">${r.village}</span></div>
                        ${r.note ? `<p style="font-size:12px; color:var(--text-muted); margin-top:4px;">${r.note}</p>` : ''}
                        <div style="margin-top:6px;">${r.tags.map(t=>`<span class="tag" style="font-size:11px; padding:2px 8px;">${t}</span>`).join('')}</div>
                      </div>
                    </div>`).join('')}
                </div>`}
          </div>

          <!-- AI Report -->
          <div class="card section-card" id="reportSection">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
              <h3 style="margin:0;">🤖 이달의 AI 성장 리포트</h3>
              <button class="btn btn-primary btn-sm" onclick="generateReport()">리포트 생성하기</button>
            </div>
            <div id="reportContent">
              <p style="font-size:13px; color:var(--text-muted);">버튼을 누르면 AI가 ${child.name}의 이달 활동을 분석해 역량 리포트를 생성합니다.</p>
            </div>
          </div>
        </div>`;

      // Try loading existing report
      fetch(`/api/report/${child.id}`).then(r => r.json()).then(report => {
        if (report) renderReport(report);
      });
    }

    async function generateReport() {
      const btn = document.querySelector('#reportSection .btn');
      btn.disabled = true;
      btn.textContent = '생성 중...';
      document.getElementById('reportContent').innerHTML = `
        <div class="report-generating" style="padding:20px;">
          <div class="spinner"></div>
          <p style="font-size:13px; color:var(--text-muted);">Claude AI가 성장 리포트를 작성 중입니다...</p>
        </div>`;

      try {
        const res = await fetch('/api/report/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ childId: selectedChild.id })
        });
        const data = await res.json();
        if (data.report) renderReport(data.report);
        else throw new Error('리포트 생성 실패');
      } catch (e) {
        document.getElementById('reportContent').innerHTML = '<p style="color:#e53e3e; font-size:13px;">리포트 생성 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.</p>';
        btn.disabled = false;
        btn.textContent = '다시 시도';
      }
    }

    function renderReport(report) {
      const btn = document.querySelector('#reportSection .btn');
      if (btn) { btn.disabled = false; btn.textContent = '다시 생성'; }

      // Simple markdown rendering
      let html = report.content
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^/g, '<p>') + '</p>';

      document.getElementById('reportContent').innerHTML = `
        <div class="report-content">${html}</div>
        <div style="margin-top:16px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted);">
          생성일: ${new Date(report.generatedAt).toLocaleDateString('ko-KR')} · Claude AI 생성
        </div>`;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    init();
  </script>
</body>
</html>
